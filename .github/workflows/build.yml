name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Build for macOS (ARM64)
        run: |
          GOOS=darwin GOARCH=arm64 go build -o ccs-darwin-arm64 -ldflags="-s -w" .
          chmod +x ccs-darwin-arm64

      - name: Build for macOS (AMD64)
        run: |
          GOOS=darwin GOARCH=amd64 go build -o ccs-darwin-amd64 -ldflags="-s -w" .
          chmod +x ccs-darwin-amd64

      - name: Build for Linux (ARM64)
        run: |
          GOOS=linux GOARCH=arm64 go build -o ccs-linux-arm64 -ldflags="-s -w" .
          chmod +x ccs-linux-arm64

      - name: Build for Linux (AMD64)
        run: |
          GOOS=linux GOARCH=amd64 go build -o ccs-linux-amd64 -ldflags="-s -w" .
          chmod +x ccs-linux-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            ccs-darwin-arm64
            ccs-darwin-amd64
            ccs-linux-arm64
            ccs-linux-amd64

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries

      - name: Create checksums
        run: |
          sha256sum ccs-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ccs-darwin-arm64
            ccs-darwin-amd64
            ccs-linux-arm64
            ccs-linux-amd64
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
